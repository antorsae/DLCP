# Crate-local cargo config: macOS Python C-extension linker
# settings.
#
# Building a Python extension module as a Rust cdylib on
# macOS produces undefined references to `_Py_*` symbols
# (e.g. `_Py_TYPE`, `__Py_Dealloc`, `__Py_NoneStruct`)
# because those symbols live in the host Python interpreter,
# not in a static `libpython.a`.  At runtime, when CPython
# does `dlopen("dlcp_sim_native.so")`, dyld resolves these
# symbols against the running interpreter's address space.
# The macOS linker, however, fails the build at link time
# unless we explicitly tell it those symbols will be
# resolved later via dynamic_lookup.
#
# This is the canonical PyO3 incantation for "I am building
# a Python extension module without maturin and need plain
# `cargo build` to succeed".  Linux's ELF linker doesn't
# need an equivalent (it tolerates undefined symbols in
# shared libs by default), so the cfg gate keeps Linux
# builds clean.

[target.'cfg(target_os = "macos")']
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
]
